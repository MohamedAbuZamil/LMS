name: Deploy · Student_Frontend

on:
  push:
    branches: [main]
    paths:
      - 'Student_Frontend/**'
      - '.github/workflows/deploy-student.yml'
      - '.github/workflows/_deploy-nextjs.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-nextjs.yml
    with:
      app_dir: Student_Frontend
      azure_webapp_name: lmszamil
    secrets:
      azure_publish_profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_LMSZAMIL }}
